name: Daily Newspaper Bot

on:
  schedule:
    - cron: '30 0 * * *' # UTC 00:30 is 6:00 AM IST
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Script (Auto Mode)
        run: python paper_bot.py --auto
